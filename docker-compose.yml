services:
  openclaw:
    image: coollabsio/openclaw:latest
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
      - "18789:18789"
    environment:
      # Provider (at least one required)
      #- ANTHROPIC_API_KEY=sk-ant-...
      - KIMI_API_KEY=${KIMI_API_KEY}
      - KIMI_BASE_URL=${KIMI_BASE_URL}
      - OPENCLAW_PRIMARY_MODEL=kimi-coding/kimi-k2.5
      # Auth
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      # Browser sidecar
      - BROWSER_CDP_URL=http://browser:9223
      - BROWSER_DEFAULT_PROFILE=openclaw
      - BROWSER_EVALUATE_ENABLED=true
      # Performance
      - NODE_COMPILE_CACHE=/var/tmp/openclaw-compile-cache
      - OPENCLAW_NO_RESPAWN=1
      - OPENCLAW_SILENT_PAIRING=true
      # Hooks (optional)
      # - HOOKS_ENABLED=true
      # - HOOKS_TOKEN=my-hook-secret
    volumes:
      - openclaw-data:/data
      - ./my-openclaw.json:/app/config/openclaw.json
      - ./patches/auth-BC0t_CEl.js:/opt/openclaw/app/dist/auth-BC0t_CEl.js:ro
      - ./scripts/configure.js:/app/scripts/configure.js:ro
    depends_on:
      - browser
    restart: unless-stopped

  browser:
    image: coollabsio/openclaw-browser:latest
    # No port exposure needed — proxied via openclaw at /browser/
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - CHROME_CLI=--remote-debugging-port=9222
    volumes:
      - browser-data:/config
    shm_size: 2g
    restart: unless-stopped

volumes:
  openclaw-data:
  browser-data:
